slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping
    provide_odom_frame: false
    resolution: 0.05
    publish_period_sec: 0.05
    max_laser_range: 10.0
    transform_publish_period_sec: 0.05
    max_update_rate_hz: 20.0
    use_scan_matching: true
    scan_queue_size: 10
    min_laser_range: 0.1
